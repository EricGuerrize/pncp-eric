<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: #1a3a6b;
      color: #fff;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      gap: 16px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: .3px; }
    header .sub { font-size: .78rem; opacity: .75; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    #ultima-atualizacao { font-size: .75rem; opacity: .65; text-align: right; white-space: nowrap; }

    /* ── Painel de Análise ────────────────────────────────── */
    .painel {
      background: #fff;
      border-bottom: 2px solid #c5cad8;
    }
    .painel-header {
      padding: 11px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      font-size: .88rem;
      font-weight: 600;
      color: #1a3a6b;
      border-bottom: 1px solid #eef0f4;
      transition: background .1s;
    }
    .painel-header:hover { background: #f5f7fb; }
    .painel-header .tag {
      display: inline-block;
      background: #e8edf5;
      color: #1a3a6b;
      border-radius: 10px;
      font-size: .68rem;
      padding: 2px 8px;
      margin-left: 8px;
      font-weight: 600;
      vertical-align: middle;
    }
    #painel-body { display: none; padding: 20px 32px 24px; }
    #painel-body.open { display: block; }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 768px) { .steps { grid-template-columns: 1fr; } }

    .step {
      border: 1.5px solid #dde1ea;
      border-radius: 10px;
      padding: 16px;
      background: #fafbfd;
      transition: border-color .2s;
    }
    .step.active { border-color: #1a3a6b; background: #f5f7fb; }
    .step.done   { border-color: #28a745; background: #f8fff9; }
    .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #dde1ea;
      color: #666;
      font-size: .8rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step.active .step-num { background: #1a3a6b; color: #fff; }
    .step.done   .step-num { background: #28a745; color: #fff; }
    .step-title { font-weight: 600; font-size: .88rem; color: #333; }

    .step-body { display: flex; flex-direction: column; gap: 8px; }
    .date-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .date-row label { font-size: .78rem; color: #555; }
    .date-row input[type=date] {
      border: 1px solid #c5cad8;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: .8rem;
      background: #fff;
      width: 140px;
    }

    .btn { border: none; border-radius: 6px; padding: 7px 14px; font-size: .82rem; cursor: pointer; font-weight: 500; transition: background .15s, opacity .15s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #1a3a6b; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #245093; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-success:hover:not(:disabled) { background: #1e7e34; }
    .btn-outline { background: #fff; border: 1.5px solid #1a3a6b; color: #1a3a6b; }
    .btn-outline:hover:not(:disabled) { background: #f0f4fa; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .file-btn {
      display: inline-block;
      background: #fff;
      border: 1.5px solid #1a3a6b;
      color: #1a3a6b;
      border-radius: 6px;

      font-weight: 500;
      cursor: pointer;

    .file-btn:hover { background: #f0f4fa; }

    .step-status {

      color: #888;

      line-height: 1.3;
    }
    .step-status.ok  { color: #1e7e34; font-weight: 500; }
    .step-status.err { color: #dc3545; }
    .step-status.loading { color: #1a3a6b; }

    /* Progress */
    .progress-wrap { margin-top: 14px; }
    .progress-bar {
      height: 6px;
      background: #dde1ea;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {

// ═══════════════════════════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════════════════════════

function cleanCnpj(s) { return (s||'').replace(/\D/g,''); }

function normalizeText(txt) {
  if (!txt) return '';
  txt = txt.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  txt = txt.toLowerCase();
  const stopwords = [
    'registro de precos para','registro de precos','aquisicao de','contratacao de',
    'prestacao de servicos','fornecimento de','futura e eventual','eventual e futura',
    'credenciamento de','empresa especializada','contratacao artistica',
    'prestacao de servico'
  ];
  stopwords.forEach(sw => { txt = txt.split(sw).join(' '); });
  return txt.replace(/\s+/g,' ').trim();
}

function tokenSetScore(s1, s2) {
  if (!s1 || !s2) return 0;
  const toks1 = new Set(s1.split(/\s+/).filter(t => t.length > 2));
  const toks2 = new Set(s2.split(/\s+/).filter(t => t.length > 2));
  if (!toks1.size || !toks2.size) return 0;
  let inter = 0;
  toks1.forEach(t => { if (toks2.has(t)) inter++; });
  const union = toks1.size + toks2.size - inter;
  return Math.round(inter / union * 100);
}

function parseValue(v) {
  if (v == null || v === '') return null;
  if (typeof v === 'number') return v;
  const s = String(v).replace(/R\$\s*/g,'').trim();
  // Formato BR: 1.234,56
  if (/^\d{1,3}(\.\d{3})*(,\d+)?$/.test(s))
    return parseFloat(s.replace(/\./g,'').replace(',','.'));
  const n = parseFloat(s.replace(/[^\d.]/g,''));
  return isNaN(n) ? null : n;
}

function parseDate(v) {
  if (!v) return null;
  try {
    const d = new Date(v);
    return isNaN(d.getTime()) ? null : d;
  } catch { return null; }
}

function addWorkdays(date, n) {
  const d = new Date(date);
  let added = 0;
  while (added < n) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  return d;
}

function fmtDate(ts) {
  if (!ts) return '—';
  try {
    const d = ts.toDate ? ts.toDate() : (ts instanceof Date ? ts : new Date(ts));
    return d.toLocaleDateString('pt-BR');
  } catch { return '—'; }
}

function fmtValor(v) {
  if (v == null || v === '' || v === 'nan' || v === undefined) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function scoreClass(s) {
  const n = parseFloat(s);
  if (isNaN(n)) return '';
  return n >= 85 ? 'score-alto' : n >= 70 ? 'score-medio' : 'score-baixo';
}

function toYMD(date) {
  return date.toISOString().slice(0,10).replace(/-/g,'');
}

// Extrai cnpj do registro PNCP (API retorna obj aninhado)
function pncpCnpj(r) {
  return cleanCnpj(r.orgaoEntidade?.cnpj || r.orgaoEntidade_cnpj || '');
}

function setPncpStatus(msg, cls='') {
  const el = document.getElementById('pncp-status');
  el.textContent = msg;
  el.className = 'step-status' + (cls ? ' '+cls : '');
}

function setPncpProgress(pct, text) {
  document.getElementById('pncp-progress').style.display = 'block';
  document.getElementById('pncp-fill').style.width = pct + '%';
  document.getElementById('pncp-prog-text').textContent = text;
}

async function startFetchPNCP() {
  const iniRaw = document.getElementById('data-ini').value;
  const fimRaw = document.getElementById('data-fim').value;
  if (!iniRaw || !fimRaw) { setPncpStatus('Defina as duas datas.','err'); return; }

  const ini = toYMD(new Date(iniRaw));
  const fim = toYMD(new Date(fimRaw));

  const mun = MUNICIPIOS[currentMunKey];
  const cnpjSet = new Set(mun.orgaos.map(o => o.cnpj));

  document.getElementById('btn-fetch').disabled = true;
  document.getElementById('step-1').className = 'step active';
  pncpBuffer = [];

  const mods = Object.keys(MODALIDADES).map(Number);
  let total = 0;

  for (let i = 0; i < mods.length; i++) {
    const mod = mods[i];
    setPncpStatus(`Buscando modalidade ${i+1}/${mods.length}: ${MODALIDADES[mod]}…`, 'loading');
    setPncpProgress(Math.round(i / mods.length * 100), `Modalidade ${i+1} de ${mods.length}`);

    try {
      const first = await fetchPage(ini, fim, mod, 1, mun.uf);
      if (!first || !first.data) continue;

      const items = first.data.filter(r => cnpjSet.has(pncpCnpj(r)));
      pncpBuffer.push(...items);
      total += items.length;

      const pages = first.totalPaginas || 1;
      for (let p = 2; p <= pages; p++) {
        const page = await fetchPage(ini, fim, mod, p, mun.uf);
        if (page && page.data) {
          const more = page.data.filter(r => cnpjSet.has(pncpCnpj(r)));
          pncpBuffer.push(...more);
          total += more.length;
        }
      }
    } catch (e) {
      console.warn(`Modalidade ${mod} erro:`, e.message);
      if (e.message.includes('Failed to fetch') || e.message.includes('CORS')) {
        setPncpStatus('Erro de CORS: o navegador bloqueou a API PNCP. Rode em localhost ou use o pipeline Python.','err');
        document.getElementById('btn-fetch').disabled = false;
        document.getElementById('pncp-progress').style.display = 'none';
        return;
      }
    }
  }

  setPncpProgress(100, 'Concluído');
  document.getElementById('btn-fetch').disabled = false;

  if (total === 0) {
    setPncpStatus(`Nenhum registro encontrado para ${mun.nome} no período.`,'err');
    document.getElementById('step-1').className = 'step';
  } else {
    setPncpStatus(`✓ ${total} registros carregados para ${mun.nome}.`,'ok');
    document.getElementById('step-1').className = 'step done';
    checkCrossReady();
  }
}

async function fetchPage(ini, fim, mod, pagina, uf) {
  const url = `${PNCP_API}/contratacoes/publicacao?dataInicial=${ini}&dataFinal=${fim}` +
    `&codigoModalidadeContratacao=${mod}&uf=${uf}&pagina=${pagina}&tamanhoPagina=50`;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  return resp.json();
}

// Constrói mapa ug → cnpj para o município atual
function buildUgCnpjMap() {
  const map = {};
  MUNICIPIOS[currentMunKey].orgaos.forEach(o => {
    o.ugs.forEach(ug => { map[ug.trim()] = o.cnpj; });
  });
  return map;
}

function onFileAplic(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('step-2').className = 'step active';
  setAplicStatus('Lendo arquivo…','loading');

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    encoding: 'UTF-8',
    complete(results) {
      const rows = results.data;
      if (!rows.length) {
        setAplicStatus('Arquivo vazio ou inválido.','err');
        document.getElementById('step-2').className = 'step';
        return;
      }
      aplicsBuffer = processAplic(rows);
      if (!aplicsBuffer.length) {
        setAplicStatus('Nenhum registro do município encontrado no CSV.','err');
        document.getElementById('step-2').className = 'step';
        return;
      }
      setAplicStatus(`✓ ${aplicsBuffer.length} registros carregados do APLIC.`,'ok');
      document.getElementById('step-2').className = 'step done';
      checkCrossReady();
    },
    error(err) {
      setAplicStatus('Erro ao ler o arquivo: ' + err.message,'err');
      document.getElementById('step-2').className = 'step';
    }
  });
}

function processAplic(rows) {
  const mun = MUNICIPIOS[currentMunKey];
  const munNome = mun.nome.toLowerCase();
  const ugMap = buildUgCnpjMap();

  // Descobre colunas dinamicamente (o APLIC não tem header fixo)
  const header = Object.keys(rows[0] || {});
  const col = (keywords) => header.find(h => keywords.some(k => h.toLowerCase().includes(k))) || null;

  const colUg      = col(['cód. ug','cod. ug','ug','cod_ug','ugcod']);
  const colMun     = col(['município','municipio']);
  const colNum     = col(['nº licitaç','licitac','licitaç','nº licit','numero']);
  const colExerc   = col(['exercício','exercicio','ano']);
  const colMod     = col(['cod. modal','modalidade']);
  const colObj     = col(['objetivo','objeto']);
  const colMotivo  = col(['motivo']);
  const colData    = col(['data abertura','abertura']);
  const colValEst  = col(['valor estimado','val. est','estimado']);

  // Forward-fill do Cód. UG (o APLIC agrupa UGs)
  let lastUg = '';
  const processed = [];

  rows.forEach(row => {
    const ugRaw = (colUg ? row[colUg] : '') || '';
    const ug = ugRaw.trim() || lastUg;
    if (ug) lastUg = ug;

    const munRow = (colMun ? row[colMun] : '').toLowerCase();
    const cnpj = ugMap[ug] || null;

    // Filtra: inclui apenas registros do município selecionado
    const isMun = munRow.includes(munNome.split(' ')[0].toLowerCase()) ||
                  (cnpj && mun.orgaos.some(o => o.cnpj === cnpj));
    if (!isMun) return;

    const numRaw  = colNum    ? row[colNum]    : '';
    const exerc   = colExerc  ? row[colExerc]  : '';
    const modCod  = colMod    ? row[colMod]    : '';
    const obj     = colObj    ? row[colObj]    : '';
    const motivo  = colMotivo ? row[colMotivo] : '';
    const dataRaw = colData   ? row[colData]   : '';
    const valRaw  = colValEst ? row[colValEst] : '';

    // Número puro
    const numMatch = (numRaw||'').match(/(\d+)/);
    const numero = numMatch ? numMatch[1] : numRaw;

    // Ano do exercício
    const anoMatch = (numRaw||'').match(/\d+\s*[/\-]\s*(20\d{2}|\d{2})/) ||
                     (exerc||'').match(/(20\d{2})/);
    let ano = anoMatch ? anoMatch[1] : (exerc||'');
    if (ano && ano.length === 2) ano = '20' + ano;

    processed.push({
      _cnpj:        cnpj || '',
      _ug:          ug,
      _numero:      numero,
      _ano:         ano,
      _mod_id:      MODAL_APLIC_PNCP[String(modCod).padStart(2,'0')] || null,
      _obj_norm:    normalizeText(obj || motivo),
      _obj_raw:     obj || motivo,
      _data:        parseDate(dataRaw),
      _valor:       parseValue(valRaw),
      _orgao_nome:  mun.orgaos.find(o => o.cnpj === cnpj)?.nome || ug,
      _raw:         row  // mantém original para exibição
    });
  });

  return processed;
}

// STEP 3 — CROSS-MATCH
// ═══════════════════════════════════════════════════════════════════════════

function checkCrossReady() {
  const ready = pncpBuffer.length > 0 && aplicsBuffer.length > 0;
  document.getElementById('btn-cross').disabled = !ready;
  if (ready) {
    document.getElementById('cross-status').textContent =
      `Pronto: ${pncpBuffer.length} PNCP × ${aplicsBuffer.length} APLIC.`;
    document.getElementById('step-3').className = 'step active';
  }
}

function setCrossStatus(msg, cls='') {
  const el = document.getElementById('cross-status');
  el.textContent = msg;
  el.className = 'step-status' + (cls ? ' '+cls : '');
}

function computeScore(p, a) {
  // Texto: 50%
  const textScore = tokenSetScore(p._obj_norm, a._obj_norm);

  // Valor: 30%
  let valScore = 50;
  const vp = p._valor, va = a._valor;
  if (vp && va && vp > 0 && va > 0) {
    const delta = Math.abs(vp - va) / Math.max(vp, va) * 100;
    valScore = delta <= 10 ? 100 : delta <= 30 ? 50 : 0;
  }

  // Data: 20%
  let dateScore = 50;
  if (p._data && a._data) {
    const deltaDays = Math.abs((p._data - a._data) / 86400000);
    dateScore = deltaDays <= 15 ? 100 : deltaDays <= 30 ? 50 : 0;
  }

  return Math.round(textScore * 0.5 + valScore * 0.3 + dateScore * 0.2);
}

function runCrossMatch() {
  if (!pncpBuffer.length || !aplicsBuffer.length) return;

  document.getElementById('btn-cross').disabled = true;
  setCrossStatus('Cruzando…','loading');

  const mun = MUNICIPIOS[currentMunKey];

  // Prepara PNCP: agrega campos acessíveis
  const pncp = pncpBuffer.map(r => ({
    _cnpj:      pncpCnpj(r),
    _numero:    String(r.numeroCompra || '').match(/(\d+)/)?.[1] || '',
    _ano:       String(r.anoCompra || ''),
    _obj_norm:  normalizeText(r.objetoCompra || ''),
    _data:      parseDate(r.dataPublicacaoPncp || r.dataAberturaProposta),
    _valor:     parseFloat(r.valorTotalEstimado) || null,
    _raw:       r
  }));

  // Agrupa APLIC por CNPJ
  const aplicssByCnpj = {};
  aplicsBuffer.forEach((a, i) => {
    const key = a._cnpj || '__sem_cnpj';
    if (!aplicssByCnpj[key]) aplicssByCnpj[key] = [];
    aplicssByCnpj[key].push({...a, _idx: i});
  });

  const matched         = [];
  const matchedPncpIdx  = new Set();
  const matchedAplicIdx = new Set();

  // Para cada PNCP, encontra melhor APLIC (mesmo CNPJ)
  pncp.forEach((p, pi) => {
    const candidates = aplicssByCnpj[p._cnpj] || [];
    let best = null, bestScore = 0;

    candidates.forEach(a => {
      if (matchedAplicIdx.has(a._idx)) return;
      const score = computeScore(p, a);
      if (score > bestScore && score >= 60) { bestScore = score; best = a; }
    });

    if (best) {
      matchedAplicIdx.add(best._idx);
      matchedPncpIdx.add(pi);
      matched.push({ pncp: p, aplic: best, score: bestScore,
        status: bestScore >= 85 ? 'MATCH_CONFIRMADO' : 'MATCH_PARCIAL' });
    }
  });

  // Apenas PNCP
  const apenas_pncp = pncp.filter((_, i) => !matchedPncpIdx.has(i));
  // Apenas APLIC
  const apenas_aplic = aplicsBuffer.filter((_, i) => !matchedAplicIdx.has(i));

  crossResult = { matched, apenas_pncp, apenas_aplic };

  const summary = `✓ ${matched.length} cruzados | ${apenas_pncp.length} só PNCP | ${apenas_aplic.length} só APLIC`;
  setCrossStatus(summary, 'ok');
  document.getElementById('step-3').className = 'step done';
  document.getElementById('btn-save').disabled = false;

  // Exibe resultados no monitor
  viewSource = 'analise';
  document.getElementById('fonte-chip').textContent = '🔬 Análise';
  document.getElementById('fonte-chip').className = 'fonte-chip analise';
  monitorCache = { ambos: null, apenas_pncp: null, apenas_aplic: null };
  renderFromCross();
}

// Converte crossResult para o formato que as funções de render esperam
function renderFromCross() {
  const mun = MUNICIPIOS[currentMunKey];

  const ambos = crossResult.matched.map(m => {
    const r = m.pncp._raw;
    const a = m.aplic;
    const dataPNCP = m.pncp._data;
    return {
      orgao:         r.unidadeOrgao?.nomeUnidade || r.unidadeOrgao_nomeUnidade || '',
      modalidade:    r.modalidadeNome || MODALIDADES[r.modalidadeId] || '',
      numero:        r.numeroCompra || '',
      ano:           String(r.anoCompra || ''),
      objeto:        r.objetoCompra || '',
      valor:         m.pncp._valor,
      cnpj:          m.pncp._cnpj,
      dataPNCP:      dataPNCP,
      prazoAplic:    dataPNCP ? addWorkdays(dataPNCP, 3) : null,
      statusPNCP:    'S', statusAPLIC: 'S', alertaAtivo: false,
      orgao_aplic:   a._orgao_nome || '',
      numero_aplic:  a._numero || '',
      objeto_aplic:  a._obj_raw || '',
      valor_aplic:   a._valor,
      dataAPLIC:     a._data,
      score_cruzamento: m.score,
      estrategia_match: m.status,
      municipio:     currentMunKey
    };
  });

  const apenas_pncp = crossResult.apenas_pncp.map(p => {
    const r = p._raw;
    const dataPNCP = p._data;
    return {
      orgao:       r.unidadeOrgao?.nomeUnidade || r.unidadeOrgao_nomeUnidade || '',
      modalidade:  r.modalidadeNome || MODALIDADES[r.modalidadeId] || '',
      numero:      r.numeroCompra || '',
      ano:         String(r.anoCompra || ''),
      objeto:      r.objetoCompra || '',
      valor:       p._valor,
      cnpj:        p._cnpj,
      dataPNCP:    dataPNCP,
      prazoAplic:  dataPNCP ? addWorkdays(dataPNCP, 3) : null,
      statusPNCP:  'S', statusAPLIC: 'pendente',
      alertaAtivo: dataPNCP ? (new Date() > addWorkdays(dataPNCP, 3)) : false,
      municipio:   currentMunKey
    };
  });

  const apenas_aplic = crossResult.apenas_aplic.map(a => ({
    orgao:      a._orgao_nome || '',
    modalidade: MODALIDADES[a._mod_id] || '',
    numero:     a._numero || '',
    ano:        a._ano || '',
    objeto:     a._obj_raw || '',
    valor:      a._valor,
    cnpj:       a._cnpj || '',
    dataAPLIC:  a._data,
    statusPNCP: 'N', statusAPLIC: 'S',
    municipio:  currentMunKey
  }));

  renderAll({ ambos, apenas_pncp, apenas_aplic });
}

async function saveToFirebase() {
  if (!crossResult) return;
  document.getElementById('btn-save').disabled = true;
  setCrossStatus('Salvando no Firebase…','loading');

  try {
    const TS = firebase.firestore.FieldValue.serverTimestamp();

    // Salva ambos
    for (const m of crossResult.matched) {
      const r = m.pncp._raw;
      const a = m.aplic;
      const dataPNCP = m.pncp._data;
      const docId = String(r.numeroControlePNCP || `${m.pncp._cnpj}-${m.pncp._numero}-${m.pncp._ano}`)
        .replace(/\//g,'_');
      if (!docId) continue;

      const doc = {
        municipio:       currentMunKey,
        orgao:           String(r.unidadeOrgao?.nomeUnidade || r.unidadeOrgao_nomeUnidade || '').slice(0,80),
        modalidade:      String(r.modalidadeNome || MODALIDADES[r.modalidadeId] || '').slice(0,60),
        numero:          String(r.numeroCompra || ''),
        ano:             String(r.anoCompra || ''),
        objeto:          String(r.objetoCompra || '').slice(0,300),
        valor:           m.pncp._valor,
        cnpj:            m.pncp._cnpj,
        dataPNCP:        dataPNCP,
        prazoAplic:      dataPNCP ? addWorkdays(dataPNCP,3) : null,
        statusPNCP:      'S', statusAPLIC: 'S', alertaAtivo: false,
        orgao_aplic:     String(a._orgao_nome || '').slice(0,80),
        numero_aplic:    String(a._numero || ''),
        objeto_aplic:    String(a._obj_raw || '').slice(0,300),
        valor_aplic:     a._valor,
        dataAPLIC:       a._data,
        score_cruzamento: String(m.score),
        estrategia_match: m.status,
        criadoEm:        TS, atualizadoEm: TS
      };
      await sub('ambos').doc(docId).set(doc);

      // Remove de apenas_pncp se existir
      await sub('apenas_pncp').doc(docId).delete();
    }

    // Salva apenas_pncp
    for (const p of crossResult.apenas_pncp) {
      const r = p._raw;
      const dataPNCP = p._data;
      const docId = String(r.numeroControlePNCP || '').replace(/\//g,'_');
      if (!docId) continue;

      // Não reescreve se já está em ambos
      const inAmbos = await sub('ambos').doc(docId).get();
      if (inAmbos.exists) continue;

      const doc = {
        municipio:   currentMunKey,
        orgao:       String(r.unidadeOrgao?.nomeUnidade || r.unidadeOrgao_nomeUnidade || '').slice(0,80),
        modalidade:  String(r.modalidadeNome || MODALIDADES[r.modalidadeId] || '').slice(0,60),
        numero:      String(r.numeroCompra || ''),
        ano:         String(r.anoCompra || ''),
        objeto:      String(r.objetoCompra || '').slice(0,300),
        valor:       p._valor,
        cnpj:        p._cnpj,
        dataPNCP:    dataPNCP,
        prazoAplic:  dataPNCP ? addWorkdays(dataPNCP,3) : null,
        statusPNCP:  'S', statusAPLIC: 'pendente',
        alertaAtivo: dataPNCP ? (new Date() > addWorkdays(dataPNCP,3)) : false,
        criadoEm: TS, atualizadoEm: TS
      };
      await sub('apenas_pncp').doc(docId).set(doc);
    }

    // Salva apenas_aplic
    for (const a of crossResult.apenas_aplic) {
      const docId = `${a._cnpj||'sem'}-${a._numero||'0'}-${a._ano||'0'}`;
      const doc = {
        municipio:   currentMunKey,
        orgao:       String(a._orgao_nome || '').slice(0,80),
        modalidade:  String(MODALIDADES[a._mod_id] || '').slice(0,60),
        numero:      String(a._numero || ''),
        ano:         String(a._ano || ''),
        objeto:      String(a._obj_raw || '').slice(0,300),
        valor:       a._valor,
        cnpj:        a._cnpj || '',
        dataAPLIC:   a._data,
        statusPNCP:  'N', statusAPLIC: 'S',
        criadoEm: TS, atualizadoEm: TS
      };
      await sub('apenas_aplic').doc(docId).set(doc);
    }

    setCrossStatus('✓ Dados salvos no Firebase com sucesso!','ok');
    document.getElementById('btn-save').disabled = false;

    // Recarrega monitor do Firebase
    viewSource = 'firebase';
    document.getElementById('fonte-chip').textContent = '📡 Firebase';
    document.getElementById('fonte-chip').className = 'fonte-chip';
    monitorCache = { ambos: null, apenas_pncp: null, apenas_aplic: null };
    await loadMonitor();

  } catch(e) {
    setCrossStatus('Erro ao salvar: ' + e.message,'err');
    document.getElementById('btn-save').disabled = false;
    console.error(e);
  }
}

async function carregarSub(name) {
  if (monitorCache[name]) return monitorCache[name];
  const snap = await sub(name).orderBy('atualizadoEm','desc').get();
  monitorCache[name] = snap.docs.map(d => ({id:d.id,...d.data()}));
  return monitorCache[name];
}

async function loadMonitor() {
  try {
    const [ambos, apenas_pncp, apenas_aplic] = await Promise.all([
      carregarSub('ambos'), carregarSub('apenas_pncp'), carregarSub('apenas_aplic')
    ]);

    const data = { ambos, apenas_pncp, apenas_aplic };
    updateAnoFilterFromData(data);
    updateOrgaoFilterFromData(data);
    renderAll(data);

    // Última atualização
    const all = [...ambos, ...apenas_pncp, ...apenas_aplic];
    let ultima = null;
    all.forEach(d => {
      if (!d.atualizadoEm) return;
      const t = d.atualizadoEm.toDate?.() ?? new Date(d.atualizadoEm);
      if (!ultima || t > ultima) ultima = t;
    });
    document.getElementById('ultima-atualizacao').textContent =
      ultima ? 'Atualizado ' + ultima.toLocaleString('pt-BR') : '';

  } catch(e) {
    document.getElementById('table-container').innerHTML =
      `<div class="state-msg">Erro ao carregar Firebase: ${e.message}</div>`;
    console.error(e);
  }
}

function updateCards(data) {
  const { ambos, apenas_pncp, apenas_aplic } = data;
  const fa = applyFiltros(ambos);

  const fc = applyFiltros(apenas_aplic);

  document.getElementById('cnt-aplic').textContent   = fc.length;

  document.getElementById('badge-pncp').textContent   = fp.length;
  document.getElementById('badge-aplic').textContent  = fc.length;
  const alertas = fp.filter(d => d.alertaAtivo).length;
  document.getElementById('cnt-alertas').textContent = alertas;
}

function renderAll(data) {
  updateCards(data);
  renderTab(data);
}

function renderTab(data) {
  const container = document.getElementById('table-container');
  container.innerHTML = '<div class="state-msg"><div class="spinner"></div><br>Carregando…</div>';

  const { ambos, apenas_pncp, apenas_aplic } = data;

  let html = '';
  if (abaAtiva === 'ambos')            html = renderAmbos(applyFiltros(ambos));
  else if (abaAtiva === 'apenas_pncp') html = renderApenasPncp(applyFiltros(apenas_pncp));
  else                                 html = renderApenasAplic(applyFiltros(apenas_aplic));

  container.innerHTML = html;
}

function renderAmbos(docs) {
  if (!docs.length) return '<div class="state-msg">Nenhum registro encontrado.</div>';
  const rows = docs.map(d => `
    <tr>
      <td>${d.orgao||'—'}</td>
      <td>${d.modalidade||'—'}</td>
      <td style="white-space:nowrap">${d.numero||'—'}/${d.ano||'—'}</td>
      <td class="obj-cell">
        <div class="obj-text" title="${(d.objeto||'').replace(/"/g,"'")}"><strong>PNCP:</strong> ${d.objeto||'—'}</div>
        ${d.objeto_aplic ? `<div class="obj-text" style="color:#555;margin-top:2px" title="${(d.objeto_aplic||'').replace(/"/g,"'")}"><strong>APLIC:</strong> ${d.objeto_aplic}</div>` : ''}
      </td>
      <td style="white-space:nowrap">
        <div>${fmtValor(d.valor)}</div>
        ${d.valor_aplic!=null ? `<div style="color:#888;font-size:.73rem">${fmtValor(d.valor_aplic)}</div>` : ''}
      </td>
      <td><span class="score-pill ${scoreClass(d.score_cruzamento)}">${d.score_cruzamento!=null ? Math.round(parseFloat(d.score_cruzamento)) : '—'}</span></td>
      <td style="white-space:nowrap">${fmtDate(d.dataPNCP)}</td>
      <td style="white-space:nowrap">${fmtDate(d.dataAPLIC)}</td>
      <td style="font-size:.73rem;color:#666">${d.estrategia_match||'—'}</td>
    </tr>`).join('');
  return `<table>
    <thead><tr><th>Órgão PNCP</th><th>Modalidade</th><th>Nº/Ano</th><th>Objeto (PNCP / APLIC)</th>
    <th>Valor</th><th>Score</th><th>Data PNCP</th><th>Data APLIC</th><th>Estratégia</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function renderApenasPncp(docs) {
  if (!docs.length) return '<div class="state-msg">Nenhum registro encontrado.</div>';
  const rows = docs.map(d => `
    <tr class="${d.alertaAtivo?'alerta':''}">
      <td>${d.orgao||'—'}</td>
      <td>${d.modalidade||'—'}</td>
      <td style="white-space:nowrap">${d.numero||'—'}/${d.ano||'—'}</td>
      <td class="obj-cell"><div class="obj-text" title="${(d.objeto||'').replace(/"/g,"'")}">${d.objeto||'—'}</div></td>
      <td style="white-space:nowrap">${fmtValor(d.valor)}</td>
      <td style="white-space:nowrap">${fmtDate(d.dataPNCP)}</td>
      <td style="white-space:nowrap">${fmtDate(d.prazoAplic)}</td>
      <td>${d.alertaAtivo ? '<span class="badge-alerta" title="Publicado no PNCP há mais de 3 dias úteis e ainda sem registro no APLIC">VENCIDO</span>' : '<span class="chip chip-p">pendente</span>'}</td>
    </tr>`).join('');
  return `<table>
    <thead><tr><th>Órgão</th><th>Modalidade</th><th>Nº/Ano</th><th>Objeto</th>
    <th>Valor</th><th>Data PNCP</th><th>Prazo APLIC</th><th>Status APLIC</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

function renderApenasAplic(docs) {
  if (!docs.length) return '<div class="state-msg">Nenhum registro nesta categoria.</div>';
  const rows = docs.map(d => `
    <tr>
      <td>${d.orgao||'—'}</td>
      <td>${d.modalidade||'—'}</td>
      <td style="white-space:nowrap">${d.numero||'—'}/${d.ano||'—'}</td>
      <td class="obj-cell"><div class="obj-text" title="${(d.objeto||'').replace(/"/g,"'")}">${d.objeto||'—'}</div></td>
      <td style="white-space:nowrap">${fmtValor(d.valor)}</td>
      <td style="white-space:nowrap">${fmtDate(d.dataAPLIC)}</td>
      <td><span class="chip chip-n">Sem PNCP</span></td>
    </tr>`).join('');

    <thead><tr><th>Órgão</th><th>Modalidade</th><th>Nº/Ano</th><th>Objeto</th>

}

// ═══════════════════════════════════════════════════════════════════════════
// EVENTOS DE UI
// ═══════════════════════════════════════════════════════════════════════════

function switchTab(name, btn) {
  abaAtiva = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('table-container');
  container.innerHTML = '<div class="state-msg"><div class="spinner"></div><br>Carregando…</div>';

  if (viewSource === 'analise' && crossResult) renderFromCross();
  else if (monitorCache.ambos !== null) renderAll(monitorCache);
  else loadMonitor();
}

function onFiltroChange(val) {
  orgaoFiltro = val;
  if (viewSource === 'analise' && crossResult) renderFromCross();
  else if (monitorCache.ambos !== null) renderAll(monitorCache);
}

function changeMunicipio(key) {
  currentMunKey = key;
  const mun = MUNICIPIOS[key];
  const nome = mun ? mun.nome : slugToNome(key);
  document.getElementById('header-sub').textContent = `${nome} — MT · 2026`;
  const selMun = document.getElementById('filtro-municipio');
  if (selMun) selMun.value = key;

  // Reset buffers e cache
  pncpBuffer = []; aplicsBuffer = []; crossResult = null;
  monitorCache = { ambos: null, apenas_pncp: null, apenas_aplic: null };
  viewSource = 'firebase';
  const chip = document.getElementById('fonte-chip');
  if (chip) { chip.textContent = '📡 Firebase'; chip.className = 'fonte-chip'; }

  init();
}

function slugToNome(slug) {
  const NOMES = {
    sinop: 'Sinop', cuiaba: 'Cuiabá', varzea_grande: 'Várzea Grande',
    rondonopolis: 'Rondonópolis', tangara_da_serra: 'Tangará da Serra',
    sorriso: 'Sorriso', lucas_do_rio_verde: 'Lucas do Rio Verde',
    caceres: 'Cáceres', alta_floresta: 'Alta Floresta',
    barra_do_garcas: 'Barra do Garças', colider: 'Colíder',
    primavera_do_leste: 'Primavera do Leste', nova_mutum: 'Nova Mutum',
  };
  if (NOMES[slug]) return NOMES[slug];
  return slug.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

async function loadMunicipios() {
  try {
    const snap = await db.collection('municipios').orderBy('nome').get();
    if (snap.empty) return;
    const sel = document.getElementById('filtro-municipio');

    // Filtra apenas cidades do MVP
    const mvpDocs = snap.docs.filter(d => MUNICIPIOS_MVP.has(d.id));
    if (!mvpDocs.length) return;

    const slugsDisponiveis = mvpDocs.map(d => d.id);
    if (!slugsDisponiveis.includes(currentMunKey)) {
      currentMunKey = slugsDisponiveis[0];
    }

    sel.innerHTML = mvpDocs
      .map(d => {
        const slug = d.id;
        const nome = d.data().nome || slugToNome(slug);
        return `<option value="${slug}"${slug === currentMunKey ? ' selected' : ''}>${nome}</option>`;
      })
      .join('');

    const nomeSelecionado = mvpDocs.find(d => d.id === currentMunKey)?.data().nome
      || slugToNome(currentMunKey);
    document.getElementById('header-sub').textContent = `${nomeSelecionado} — MT · 2026`;
  } catch(e) {
    console.warn('Erro ao carregar municípios:', e);
  }
}

function updateOrgaoFilter() {
  const sel = document.getElementById('filtro-orgao');
  const mun = MUNICIPIOS[currentMunKey];
  if (mun) {
    sel.innerHTML = '<option value="">Todos</option>' +
      mun.orgaos.map(o => `<option value="${o.nome}">${o.nome}</option>`).join('');
  } else {
    sel.innerHTML = '<option value="">Todos</option>';
  }
  orgaoFiltro = '';
}

function updateAnoFilterFromData(data) {
  const anos = new Set();
  [...(data.ambos||[]), ...(data.apenas_pncp||[]), ...(data.apenas_aplic||[])].forEach(d => {
    if (d.ano) anos.add(String(d.ano));
  });
  const sel = document.getElementById('filtro-ano');
  const sorted = Array.from(anos).sort().reverse();
  sel.innerHTML = '<option value="">Todos</option>' +
    sorted.map(a => `<option value="${a}"${a === filtroAno ? ' selected' : ''}>${a}</option>`).join('');
  if (sorted.length && !sorted.includes(filtroAno)) filtroAno = sorted[0] || '';
}

function updateOrgaoFilterFromData(data) {
  const orgaos = new Set();
  const docs = applyFiltros(
    [...(data.ambos||[]), ...(data.apenas_pncp||[]), ...(data.apenas_aplic||[])],
    { ignoreOrgao: true }
  );
  docs.forEach(d => { if (d.orgao) orgaos.add(d.orgao); });
  const sel = document.getElementById('filtro-orgao');
  const sorted = Array.from(orgaos).sort();
  sel.innerHTML = '<option value="">Todos</option>' +
    sorted.map(o => `<option value="${o}"${o === orgaoFiltro ? ' selected' : ''}>${o}</option>`).join('');
}

function applyFiltros(docs, opts = {}) {
  return docs.filter(d => {
    if (!opts.ignoreOrgao && orgaoFiltro &&
        !(d.orgao||'').toLowerCase().includes(orgaoFiltro.toLowerCase())) return false;
    if (filtroAno && String(d.ano||'') !== filtroAno) return false;
    return true;
  });
}

function onAnoChange(val) {
  filtroAno = val;
  updateOrgaoFilterFromData(monitorCache.ambos !== null ? monitorCache : { ambos:[], apenas_pncp:[], apenas_aplic:[] });
  if (viewSource === 'analise' && crossResult) renderFromCross();
  else if (monitorCache.ambos !== null) renderAll(monitorCache);
}

function onMunicipioChange(key) {
  changeMunicipio(key);
}

function togglePainel() {
  painelAberto = !painelAberto;
  const body = document.getElementById('painel-body');
  const icon = document.getElementById('painel-icon');
  if (painelAberto) { body.classList.add('open'); icon.textContent = '▲ fechar'; }
  else              { body.classList.remove('open'); icon.textContent = '▼ abrir'; }
}

// INIT
// ═══════════════════════════════════════════════════════════════════════════

function setDefaultDates() {
  const fim = new Date();
  const ini = new Date();
  ini.setDate(ini.getDate() - 30);
  document.getElementById('data-ini').value = ini.toISOString().slice(0,10);
  document.getElementById('data-fim').value = fim.toISOString().slice(0,10);
}

async function init() {
  monitorCache = { ambos: null, apenas_pncp: null, apenas_aplic: null };
  await loadMunicipios();
  if (viewSource === 'firebase') await loadMonitor();
}

// Inicializa
setDefaultDates();
init();
</script>
