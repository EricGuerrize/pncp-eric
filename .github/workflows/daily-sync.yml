name: Daily PNCP Sync

on:
  schedule:
    # Roda às 02:00 UTC = 23:00 BRT (após expediente), dias úteis
    - cron: '0 2 * * 1-5'
  workflow_dispatch:
    inputs:
      ano:
        description: 'Ano a processar (ex: 2026)'
        required: false
        default: ''
      cidades:
        description: 'Cidades separadas por espaço (vazio = todas MVP)'
        required: false
        default: ''

jobs:
  crossmatch:
    runs-on: ubuntu-latest   # roda na nuvem, sem Oracle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt --quiet

      - name: Injetar credenciais Firebase
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: echo "$FIREBASE_CREDENTIALS" > firebase_credentials.json

      - name: Definir parâmetros
        id: params
        run: |
          ANO="${{ github.event.inputs.ano }}"
          [ -z "$ANO" ] && ANO=$(date +%Y)
          echo "ano=$ANO" >> $GITHUB_OUTPUT

          CIDADES="${{ github.event.inputs.cidades }}"
          [ -z "$CIDADES" ] && CIDADES="rondolandia acorizal jangada lucas_do_rio_verde sinop"
          echo "cidades=$CIDADES" >> $GITHUB_OUTPUT

      - name: Crossmatch Firebase → Firebase
        env:
          FIREBASE_CREDENTIALS_PATH: ${{ github.workspace }}/firebase_credentials.json
        run: |
          cd pncp_pipeline
          python pipeline_multicidades.py \
            --cidades ${{ steps.params.outputs.cidades }} \
            --ano ${{ steps.params.outputs.ano }} \
            --skip-oracle \
            --skip-pncp-sync

      - name: Limpar credenciais
        if: always()
        run: rm -f firebase_credentials.json
